<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#06101d">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="screen-orientation" content="landscape">
  <title>KOMSCO Neon Farm City</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./style.css?v=dpad-fit-fix-v16">
</head>
<body>
<div id="orientationNotice">
  <div><b>휴대전화를 가로로 돌려주세요</b><span>게임 화면은 가로 모드로 실행됩니다.</span></div>
</div>

<main id="gameShell">
  <canvas id="game"></canvas>
  <section id="fatalError"><div><h2>게임을 불러오지 못했습니다.</h2><p id="fatalMessage">페이지를 새로고침해 주세요.</p><button id="fatalReload" type="button">다시 불러오기</button></div></section>


  <section id="loading" class="screen show">
    <div class="brand">KOMSCO</div>
    <div class="spinner"></div>
    <b>네온시티를 준비하고 있습니다.</b>
    <div class="load-track"><i id="loadBar"></i></div>
  </section>

  <section id="characterSelect" class="screen character-select">
    <div class="select-backdrop"></div>
    <div class="select-content">
      <p class="eyebrow">SELECT YOUR HERO</p>
      <h1>함께할 캐릭터를 선택하세요</h1>
      <p class="select-copy">회사 업무를 수행하고 씨앗을 구매해 주말농장을 성장시키세요.</p>
      <div id="characterCards" class="character-cards"></div>
      <button id="startBtn" class="primary-button" type="button" disabled>⚔ 게임 시작</button>
    </div>
  </section>

  <header id="hud">
    <section class="hero-chip panel">
      <img id="portrait" src="./public/assets/characters/hunmin.png" alt="">
      <div><b id="heroName">훈민</b><span>Lv. <em id="levelText">1</em></span></div>
    </section>
    <section class="resources panel">
      <span>🪙 <b id="goldText">300</b></span>
      <span>🌱 <b id="seedText">0</b></span>
      <span>📦 <b id="harvestText">0</b></span>
    </section>
    <nav class="top-icons">
      <button id="rankingBtn" type="button">🏆<span>랭킹</span></button>
      <button id="codexBtn" type="button">📖<span>도감</span></button>
      <button id="settingsBtn" type="button">⚙️<span>설정</span></button>
      <button id="menuBtn" type="button" aria-label="보조 메뉴">☰<span>메뉴</span></button>
    </nav>
  </header>

  <aside id="questPanel" class="panel">
    <div class="quest-head"><div><small>QUEST</small><b>오늘의 미션</b></div><button id="questCollapse" type="button">−</button></div>
    <ol id="questList"></ol>
    <button id="claimRewardBtn" class="primary-button" type="button">보상 받기</button>
  </aside>

  <aside id="utilityDrawer" class="utility-drawer panel" aria-hidden="true">
    <div class="drawer-head"><b>빠른 메뉴</b><button id="drawerClose" type="button">×</button></div>
    <section>
      <small>현재 지역</small>
      <strong id="regionText">네온 중앙지구</strong>
      <img src="./public/assets/world/world_final.jpg" alt="네온시티 미리보기">
    </section>
    <section>
      <small>씨앗상점</small>
      <div class="seed-row"><span>🥕 60</span><span>🍅 90</span><span>🍓 130</span></div>
      <button id="shopShortcut" type="button">상점 바로가기</button>
    </section>
    <section>
      <small>인벤토리</small>
      <div id="inventoryPreview" class="inventory-preview"></div>
    </section>
  </aside>

  <div id="interactionHint"></div>
  <button id="interactBtn" class="primary-button" type="button">상호작용</button>

  <nav id="dpad" aria-label="이동 방향키">
    <button id="moveUp" type="button" aria-label="위로 이동">▲</button>
    <button id="moveLeft" type="button" aria-label="왼쪽으로 이동">◀</button>
    <button id="autoBtn" type="button" aria-label="자동 이동 시작/취소">AUTO</button>
    <button id="moveRight" type="button" aria-label="오른쪽으로 이동">▶</button>
    <button id="moveDown" type="button" aria-label="아래로 이동">▼</button>
  </nav>

  <div id="toast" aria-live="polite"></div>
  <section id="modal" role="dialog" aria-modal="true">
    <div class="modal-card"><button id="modalClose" type="button">×</button><div id="modalBody"></div></div>
  </section>
</main>

<script defer src="./src/config/world-data.js"></script>
<script defer src="./src/engine/path-engine.js"></script>
<script defer src="./src/game/game-systems.js"></script>
<script defer src="./src/ui/orientation.js"></script>
<script defer src="./game.js?v=dpad-fit-fix-v16"></script>
</body>
</html>
