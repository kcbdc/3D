<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="theme-color" content="#06111f">
  <meta name="color-scheme" content="dark">
  <title>KOMSCO Neon Farm City</title>
  <link rel="stylesheet" href="./style.css?v=20260723-neon-actual-v2">
</head>
<body>
  <main id="app">
    <canvas id="game" aria-label="KOMSCO 네온 주말농장 도시 게임"></canvas>
    <div class="cinematic-vignette"></div>
    <div class="scanline"></div>
    <div class="world-tag">APPROVED NEON CITY WORLD · ACTUAL APPLIED</div>

    <section id="loading" class="screen show">
      <div class="loading-logo">KOMSCO</div>
      <div class="loader"></div>
      <h1>NEON FARM CITY</h1>
      <p>도시 네트워크와 주말농장을 동기화하고 있습니다.</p>
      <div class="load-track"><div id="loadBar"></div></div>
    </section>

    <section id="characterSelect" class="screen hero-screen">
      <div class="hero-bg"></div>
      <div class="select-shell">
        <div class="select-brand">
          <strong>KOMSCO</strong>
          <span>한국조폐공사</span>
        </div>
        <div class="select-copy">
          <p class="eyebrow">SELECT YOUR HERO</p>
          <h1>영웅을 선택하세요</h1>
          <p class="sub">당신의 선택이 도시의 미래와 주말농장의 성장을 바꿉니다.</p>
        </div>
        <div id="characterCards" class="character-grid"></div>
        <button id="startBtn" class="primary big" disabled>
          <span class="button-icon">⚔</span>
          게임 시작
        </button>
      </div>
    </section>

    <header class="topbar">
      <div class="profile-card">
        <div class="level-ring">Lv.<b id="levelText">1</b></div>
        <div class="profile-copy">
          <b id="heroName">조폐 히어로즈</b>
          <span id="zoneText">중앙광장</span>
          <div class="exp-track"><div id="expFill"></div></div>
        </div>
      </div>
      <div class="currency-bar">
        <span>🪙 <b id="goldText">300</b></span>
        <span>💎 <b id="gemText">1250</b></span>
        <span>🌱 <b id="seedText">0</b></span>
        <span>📦 <b id="harvestText">0</b></span>
      </div>
      <div class="top-actions">
        <button id="missionTopBtn"><i>🎁</i><span>미션</span></button>
        <button id="rankingBtn"><i>🏆</i><span>랭킹</span></button>
        <button id="codexBtn"><i>📖</i><span>도감</span></button>
        <button id="settingsTopBtn"><i>⚙️</i><span>설정</span></button>
      </div>
    </header>

    <aside id="questPanel" class="quest-panel">
      <button id="questToggle" class="panel-toggle" aria-label="미션 패널 접기">×</button>
      <div class="panel-title">
        <span>QUEST</span>
        <b>오늘의 미션</b>
      </div>
      <ol id="questList"></ol>
      <button id="claimRewardBtn" class="claim-btn">보상 받기</button>
    </aside>

    <aside class="right-rail">
      <button id="mailBtn">✉<span>우편</span></button>
      <button id="eventBtn">🎉<span>이벤트</span></button>
    </aside>

    <div id="interactionHint" class="interaction-hint" aria-live="polite"></div>

    <nav class="bottom-nav">
      <button id="characterBtn"><i>🛡️</i><span>캐릭터</span></button>
      <button id="bagBtn"><i>🎒</i><span>가방</span></button>
      <button id="questBtn"><i>📜</i><span>퀘스트</span></button>
      <button id="shopBtn"><i>🧰</i><span>상점</span></button>
      <button id="mapBtn"><i>🗺️</i><span>지도</span></button>
      <button id="friendBtn"><i>👥</i><span>친구</span></button>
      <button id="settingsBtn"><i>⚙️</i><span>설정</span></button>
      <button id="interactBtn" class="interact"><i>⚔</i><span>상호작용</span></button>
    </nav>

    <div id="joystick" class="joystick" aria-label="이동 조이스틱"><div id="stick"></div></div>
    <button id="runBtn" class="run-btn">RUN</button>

    <div id="toast" class="toast" aria-live="polite"></div>
    <div id="modal" class="modal" role="dialog" aria-modal="true">
      <div class="modal-card">
        <button id="modalClose" class="modal-close">×</button>
        <div id="modalBody"></div>
      </div>
    </div>
  </main>
  <script defer src="./game.js?v=20260723-neon-actual-v2"></script>
</body>
</html>
