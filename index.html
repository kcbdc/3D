<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="theme-color" content="#0f3551">
  <title>KOMSCO Weekend Farm City</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main id="app">
    <canvas id="game" aria-label="KOMSCO 주말농장 도시 게임"></canvas>

    <section id="loading" class="screen show">
      <div class="loader"></div>
      <h1>KOMSCO WEEKEND FARM CITY</h1>
      <p>레고시티 스타일의 2.5D 도시를 준비하고 있습니다.</p>
      <div class="load-track"><div id="loadBar"></div></div>
    </section>

    <section id="characterSelect" class="screen">
      <div class="select-card">
        <p class="eyebrow">SELECT YOUR HERO</p>
        <h1>함께할 캐릭터를 선택하세요</h1>
        <p class="sub">회사에서 업무를 수행하고, 번 골드로 씨앗을 사서 주말농장을 가꾸세요.</p>
        <div id="characterCards" class="character-grid"></div>
        <button id="startBtn" class="primary big" disabled>도시로 입장하기</button>
      </div>
    </section>

    <header class="topbar">
      <div class="brand">
        <b>KOMSCO FARM CITY</b>
        <span id="zoneText">중앙광장</span>
      </div>
      <div class="status">
        <span>💰 <b id="goldText">300</b>G</span>
        <span>🌱 <b id="seedText">0</b></span>
        <span>📦 <b id="harvestText">0</b></span>
        <span>⭐ Lv.<b id="levelText">1</b></span>
      </div>
    </header>

    <aside id="questPanel" class="quest-panel">
      <button id="questToggle" class="panel-toggle" aria-label="미션 패널 접기">≡</button>
      <h2>오늘의 생활 루프</h2>
      <ol id="questList"></ol>
    </aside>

    <div id="interactionHint" class="interaction-hint" aria-live="polite"></div>

    <nav class="bottom-nav">
      <button id="mapBtn">🗺️<span>지도</span></button>
      <button id="bagBtn">🎒<span>가방</span></button>
      <button id="interactBtn" class="interact">✨<span>상호작용</span></button>
      <button id="questBtn">📋<span>미션</span></button>
      <button id="settingsBtn">⚙️<span>설정</span></button>
    </nav>

    <div id="joystick" class="joystick" aria-label="이동 조이스틱"><div id="stick"></div></div>
    <button id="runBtn" class="run-btn">달리기</button>

    <div id="toast" class="toast" aria-live="polite"></div>
    <div id="modal" class="modal" role="dialog" aria-modal="true">
      <div class="modal-card">
        <button id="modalClose" class="modal-close">닫기</button>
        <div id="modalBody"></div>
      </div>
    </div>
  </main>
  <script src="./game.js"></script>
</body>
</html>
